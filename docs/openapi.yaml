openapi: 3.0.3

info:
  title: MindBloom API
  version: 1.0.0
  description: API for managing habits, moods, and journals

servers:
  - url: https://mindbloom-api-service.onrender.com/api

tags:
  - name: Auth
    description: User authentication endpoints
  - name: Habits
    description: Operations related to habits
  - name: Moods
    description: Operations related to mood tracking
  - name: Journals
    description: Operations related to journal entries

paths:

  /auth/signup:
    post:
      tags: [Auth]
      summary: Register user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthCredentials'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/InvalidUserInput'
        '409':
          description: Email already exists

  /auth/login:
    post:
      tags: [Auth]
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthCredentials'
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthToken'
        '400':
          $ref: '#/components/responses/InvalidUserInput'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /habits:
    get:
      security:
        - bearerAuth: []
      tags: [Habits]
      summary: Get all habits
      responses:
        '200':
          description: List of habits
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Habit'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      security:
        - bearerAuth: []
      tags: [Habits]
      summary: Create a habit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HabitInput'
      responses:
        '201':
          description: Habit created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Habit'
        '400':
          $ref: '#/components/responses/InvalidInput'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /habits/{id}:
    get:
      security:
        - bearerAuth: []
      tags: [Habits]
      summary: Get habit by ID
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: Habit found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Habit'
        '400':
          $ref: '#/components/responses/InvalidId'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      security:
        - bearerAuth: []
      tags: [Habits]
      summary: Update habit
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HabitInput'
      responses:
        '200':
          description: Habit updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Habit'
        '400':
          $ref: '#/components/responses/InvalidInput'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      security:
        - bearerAuth: []
      tags: [Habits]
      summary: Delete habit
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '204':
          description: Habit deleted
        '400':
          $ref: '#/components/responses/InvalidId'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /moods:
    get:
      security:
        - bearerAuth: []
      tags: [Moods]
      summary: Get all moods
      responses:
        '200':
          description: List of moods
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Mood'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      security:
        - bearerAuth: []
      tags: [Moods]
      summary: Create mood entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MoodInput'
      responses:
        '201':
          description: Mood created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Mood'
        '400':
          $ref: '#/components/responses/InvalidInput'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /moods/{id}:
    get:
      security:
        - bearerAuth: []
      tags: [Moods]
      summary: Get mood by ID
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: Mood found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Mood'
        '400':
          $ref: '#/components/responses/InvalidId'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      security:
        - bearerAuth: []
      tags: [Moods]
      summary: Update mood
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MoodInput'
      responses:
        '200':
          description: Mood updated
        '400':
          $ref: '#/components/responses/InvalidInput'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      security:
        - bearerAuth: []
      tags: [Moods]
      summary: Delete mood
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '204':
          description: Mood deleted
        '400':
          $ref: '#/components/responses/InvalidId'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /journals:
    get:
      security:
        - bearerAuth: []
      tags: [Journals]
      summary: Get all journal entries
      responses:
        '200':
          description: List of journals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Journal'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      security:
        - bearerAuth: []
      tags: [Journals]
      summary: Create journal entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JournalInput'
      responses:
        '201':
          description: Journal created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Journal'
        '400':
          $ref: '#/components/responses/InvalidInput'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /journals/{id}:
    get:
      security:
        - bearerAuth: []
      tags: [Journals]
      summary: Get journal by ID
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: Journal found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Journal'
        '400':
          $ref: '#/components/responses/InvalidId'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      security:
        - bearerAuth: []
      tags: [Journals]
      summary: Update journal
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JournalInput'
      responses:
        '200':
          description: Journal updated
        '400':
          $ref: '#/components/responses/InvalidInput'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      security:
        - bearerAuth: []
      tags: [Journals]
      summary: Delete journal
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '204':
          description: Journal deleted
        '400':
          $ref: '#/components/responses/InvalidId'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

components:

  schemas:

    User:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string

    AuthCredentials:
      type: object
      properties:
        email:
          type: string
        password:
          type: string

    AuthToken:
      type: object
      properties:
        token:
          type: string

    Habit:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
        frequency:
          type: string
        userId:
          type: integer
          readOnly: true

    HabitInput:
      type: object
      required: [name, frequency]
      properties:
        name:
          type: string
        frequency:
          type: string

    Mood:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        mood:
          type: string
        note:
          type: string
        date:
          type: string
          format: date-time
          readOnly: true
        userId:
          type: integer
          readOnly: true
        habitId:
          type: integer

    MoodInput:
      type: object
      required: [mood]
      properties:
        mood:
          type: string
        note:
          type: string
        habitId:
          type: integer

    Journal:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
        content:
          type: string
        createdAt:
          type: string
          readOnly: true
        userId:
          type: integer
          readOnly: true

    JournalInput:
      type: object
      required: [title, content]
      properties:
        title:
          type: string
        content:
          type: string

  parameters:
    ResourceId:
      name: id
      in: path
      required: true
      schema:
        type: integer

  responses:
    NotFound:
      description: Resource not found
    Unauthorized:
      description: Not authenticated
    Forbidden:
      description: Forbidden
    InvalidUserInput:
      description: Invalid user input
    InvalidInput:
      description: Invalid request data
    InvalidId:
      description: ID must be a positive integer

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT